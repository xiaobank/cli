name: E2E Triage

on:
  workflow_dispatch:
    inputs:
      run_url:
        description: GitHub Actions run URL to triage
        required: true
        type: string
      sha:
        description: Commit SHA (auto-detected from run if omitted)
        required: false
        type: string
      failed_agents:
        description: Comma-separated list of failed agents (auto-detected from run if omitted)
        required: false
        type: string
      slack_channel:
        description: Slack channel ID for the originating thread
        required: false
        type: string
      slack_thread_ts:
        description: Slack thread timestamp for replies
        required: false
        type: string
      rerun:
        description: 'Re-run failing tests locally to detect flaky (costs API tokens)'
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: e2e-triage-${{ inputs.run_url || github.run_id }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    outputs:
      agents_csv: ${{ steps.set.outputs.agents_csv }}
      run_url: ${{ steps.set.outputs.run_url }}
      sha: ${{ steps.set.outputs.sha }}
      slack_channel: ${{ steps.set.outputs.slack_channel }}
      slack_thread_ts: ${{ steps.set.outputs.slack_thread_ts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: scripts

      - name: Validate payload
        id: set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_NAME: ${{ github.repository }}
          RUN_URL_INPUT: ${{ inputs.run_url }}
          SHA_INPUT: ${{ inputs.sha }}
          FAILED_AGENTS_INPUT: ${{ inputs.failed_agents }}
          SLACK_CHANNEL_INPUT: ${{ inputs.slack_channel }}
          SLACK_THREAD_TS_INPUT: ${{ inputs.slack_thread_ts }}
        run: |
          set -euo pipefail

          run_url="$RUN_URL_INPUT"
          sha="${SHA_INPUT:-}"
          slack_channel="${SLACK_CHANNEL_INPUT:-}"
          slack_thread_ts="${SLACK_THREAD_TS_INPUT:-}"

          # Derive missing values from run URL via GitHub API
          if [ -z "$sha" ] || [ -z "$FAILED_AGENTS_INPUT" ]; then
            run_id=$(echo "$run_url" | grep -oE '/runs/[0-9]+' | grep -oE '[0-9]+')
            if [ -z "$run_id" ]; then
              echo "Could not extract run ID from run_url: $run_url" >&2
              exit 1
            fi
            run_data=$(gh run view "$run_id" --repo "$REPO_NAME" --json headSha,jobs)
            if [ -z "$sha" ]; then
              sha=$(echo "$run_data" | jq -r '.headSha')
            fi
            if [ -z "$FAILED_AGENTS_INPUT" ]; then
              # Extract agent names from failed job names like "e2e (gemini-cli)"
              agents_csv=$(echo "$run_data" | jq -r '[.jobs[]
                | select(.conclusion == "failure")
                | (.name | (try capture("\\((?<agent>[^)]+)\\)").agent catch null))
                | select(. != null)
              ] | join(", ")')
            fi
          fi

          if [ -n "$FAILED_AGENTS_INPUT" ]; then
            agents_csv="$FAILED_AGENTS_INPUT"
          fi

          if [ -z "$run_url" ]; then
            echo "run_url is required" >&2
            exit 1
          fi
          if [ -z "$sha" ]; then
            echo "sha is required" >&2
            exit 1
          fi
          if [ -z "$agents_csv" ]; then
            echo "agents is required (provide failed_agents input or ensure failed job names contain '(agent-name)')" >&2
            exit 1
          fi

          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "slack_channel=$slack_channel" >> "$GITHUB_OUTPUT"
          echo "slack_thread_ts=$slack_thread_ts" >> "$GITHUB_OUTPUT"
          echo "agents_csv=$agents_csv" >> "$GITHUB_OUTPUT"

      - name: Post triage starting
        if: ${{ env.SLACK_BOT_TOKEN != '' && steps.set.outputs.slack_channel != '' && steps.set.outputs.slack_thread_ts != '' }}
        env:
          SLACK_CHANNEL: ${{ steps.set.outputs.slack_channel }}
          SLACK_THREAD_TS: ${{ steps.set.outputs.slack_thread_ts }}
          AGENTS_CSV: ${{ steps.set.outputs.agents_csv }}
          TRIAGE_RUN_URL: ${{ steps.set.outputs.run_url }}
        shell: bash
        run: |
          scripts/post-slack-message.sh "Starting E2E triage for \`${AGENTS_CSV}\` on <${TRIAGE_RUN_URL}|this run>."

  triage:
    needs: [setup]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.rerun == true && 90 || 45 }}
    env:
      RUN_URL: ${{ needs.setup.outputs.run_url }}
      FAILED_AGENTS: ${{ needs.setup.outputs.agents_csv }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ needs.setup.outputs.slack_channel }}
      SLACK_THREAD_TS: ${{ needs.setup.outputs.slack_thread_ts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Download E2E artifacts
        id: artifacts
        if: inputs.rerun != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_path="$(scripts/download-e2e-artifacts.sh "$RUN_URL")"
          echo "path=$artifact_path" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        if: inputs.rerun == true
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install agent CLIs
        if: inputs.rerun == true
        run: |
          IFS=',' read -ra agents <<< "$FAILED_AGENTS"
          for agent in "${agents[@]}"; do
            agent="$(echo "$agent" | xargs)"
            case "$agent" in
              claude-code) curl -fsSL https://claude.ai/install.sh | bash ;;
              opencode)    curl -fsSL https://opencode.ai/install | bash ;;
              gemini-cli)  npm install -g @google/gemini-cli ;;
              cursor-cli)  curl https://cursor.com/install -fsS | bash ;;
              factoryai-droid) curl -fsSL https://app.factory.ai/cli | sh ;;
              copilot-cli)  npm install -g @github/copilot  ;;
              roger-roger) ;; # installed by mise (see mise.toml)
            esac
          done
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Bootstrap agents
        if: inputs.rerun == true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: go run ./e2e/bootstrap

      - name: Run triage (analysis only)
        id: triage_analysis
        if: inputs.rerun != true
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Enter plan mode, then read and follow the full E2E triage procedure from .claude/skills/e2e/triage-ci.md.

            Inputs:
            - Local artifact path: ${{ steps.artifacts.outputs.path }}
            - Failed agents: ${{ env.FAILED_AGENTS }}
            - SHA: ${{ needs.setup.outputs.sha }}

            This is a CI artifact analysis (local path provided) -- skip Steps L2-L5 and go straight to Shared Analysis.
            Analyze ALL failed agents together -- failures may share a common root cause.

            Write ALL output to the plan file -- both the triage findings report and the fix plan. Structure it as:
            1. Triage findings (per-test findings blocks + summary table from the skill)
            2. A "## Fix Plan" section with specific code changes for each actionable finding

            When done, call ExitPlanMode.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools 'Read,Grep,Glob,Write,EnterPlanMode,ExitPlanMode'"
          display_report: false
          github_token: ${{ github.token }}

      - name: Run triage (with re-runs)
        id: triage_rerun
        if: inputs.rerun == true
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        with:
          prompt: |
            Enter plan mode, then read and follow the full E2E triage procedure from .claude/skills/e2e/triage-ci.md.

            Inputs:
            - CI run URL: ${{ env.RUN_URL }}
            - Failed agents: ${{ env.FAILED_AGENTS }}
            - SHA: ${{ needs.setup.outputs.sha }}

            Analyze ALL failed agents together -- failures may share a common root cause.

            Write ALL output to the plan file -- both the triage findings report and the fix plan. Structure it as:
            1. Triage findings (per-test findings blocks + summary table from the skill)
            2. A "## Fix Plan" section with specific code changes for each actionable finding

            When done, call ExitPlanMode.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools 'Read,Grep,Glob,Write,EnterPlanMode,ExitPlanMode,Bash(mise:*),Bash(scripts:*)'"
          display_report: false
          github_token: ${{ github.token }}

      - name: Resolve triage outcome
        id: triage
        if: always()
        shell: bash
        env:
          ANALYSIS_OUTCOME: ${{ steps.triage_analysis.outcome }}
          ANALYSIS_EXEC: ${{ steps.triage_analysis.outputs.execution_file }}
          RERUN_OUTCOME: ${{ steps.triage_rerun.outcome }}
          RERUN_EXEC: ${{ steps.triage_rerun.outputs.execution_file }}
        run: |
          outcome="${ANALYSIS_OUTCOME:-skipped}"
          exec_file="${ANALYSIS_EXEC}"
          if [ "$outcome" = "skipped" ]; then
            outcome="${RERUN_OUTCOME:-skipped}"
            exec_file="${RERUN_EXEC}"
          fi
          echo "outcome=$outcome" >> "$GITHUB_OUTPUT"
          echo "execution_file=$exec_file" >> "$GITHUB_OUTPUT"

      - name: Extract triage output
        id: triage_output
        if: always() && steps.triage.outputs.execution_file != ''
        shell: bash
        env:
          EXECUTION_FILE: ${{ steps.triage.outputs.execution_file }}
          TRIAGE_OUTPUT_FILE: ${{ github.workspace }}/e2e-triage-artifacts/triage.md
          PLAN_FILE: ${{ github.workspace }}/e2e-triage-artifacts/plan.md
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$TRIAGE_OUTPUT_FILE")"

          # Try to extract from plan file on disk (plan mode writes here)
          plan_src=$(find /home/runner/.claude/plans -name '*.md' -type f 2>/dev/null | head -1)
          if [ -n "$plan_src" ] && [ -s "$plan_src" ]; then
            combined="$(cat "$plan_src")"
          else
            # Fallback: extract assistant text from execution JSON
            combined=$(jq -r '[.[] | select(.type == "assistant") | .message.content[]
              | select(.type == "text") | .text] | join("\n")' "$EXECUTION_FILE")
          fi

          # Split on "## Fix Plan" header
          if echo "$combined" | grep -q "^## Fix Plan"; then
            echo "$combined" | sed '/^## Fix Plan/,$d' > "$TRIAGE_OUTPUT_FILE"
            echo "$combined" | sed -n '/^## Fix Plan/,$p' > "$PLAN_FILE"
          else
            echo "$combined" > "$TRIAGE_OUTPUT_FILE"
            echo "$combined" > "$PLAN_FILE"
          fi

          # Copy execution JSON to artifacts for debugging
          cp "$EXECUTION_FILE" "$(dirname "$TRIAGE_OUTPUT_FILE")/execution.json" 2>/dev/null || true

      - name: Write job summary
        if: always() && steps.triage_output.outcome == 'success'
        shell: bash
        env:
          TRIAGE_FILE: ${{ github.workspace }}/e2e-triage-artifacts/triage.md
          PLAN_FILE: ${{ github.workspace }}/e2e-triage-artifacts/plan.md
        run: |
          set -euo pipefail
          {
            echo "# E2E Triage: ${FAILED_AGENTS}"
            echo ""
            if [ -s "$TRIAGE_FILE" ]; then
              cat "$TRIAGE_FILE"
            else
              echo "_No triage findings._"
            fi
            echo ""
            echo "---"
            echo ""
            if [ -s "$PLAN_FILE" ]; then
              cat "$PLAN_FILE"
            else
              echo "_No fix plan._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post triage completion
        if: ${{ always() && (steps.triage.outputs.outcome == 'success' || steps.triage.outputs.outcome == 'failure') && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        env:
          TRIAGE_OUTCOME: ${{ steps.triage.outputs.outcome }}
        run: |
          set -euo pipefail

          if [ "$TRIAGE_OUTCOME" = "success" ]; then
            message="E2E triage complete for \`$FAILED_AGENTS\`."
          else
            message="E2E triage failed for \`$FAILED_AGENTS\`."
          fi

          scripts/post-slack-message.sh "$message"

      - name: Post fix plan to Slack
        if: steps.triage_output.outcome == 'success' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != ''
        shell: bash
        env:
          PLAN_FILE: ${{ github.workspace }}/e2e-triage-artifacts/plan.md
          TRIAGE_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          # Extract first few lines as summary
          summary="$(head -20 "$PLAN_FILE" | sed '/^$/d' | head -5)"

          # Construct Fix It URL
          encoded_run_url="$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['RUN_URL'], safe=''))")"
          encoded_agents="$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['FAILED_AGENTS'], safe=''))")"
          fix_url="https://e2e-triage.entireio.workers.dev/fix?triage_run_id=${TRIAGE_RUN_ID}&run_url=${encoded_run_url}&failed_agents=${encoded_agents}&slack_channel=${SLACK_CHANNEL}&slack_thread_ts=${SLACK_THREAD_TS}"

          message="Fix plan ready for \`$FAILED_AGENTS\`:
          ${summary}

          <${fix_url}|Fix It> — applies the plan and creates a draft PR"

          scripts/post-slack-message.sh "$message"

      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-triage
          path: e2e-triage-artifacts/
          retention-days: 7
