name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Run a single agent (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - claude-code
          - opencode
          - gemini-cli
          - factoryai-droid
          - cursor-cli
          - kiro
  push:
    branches:
      - main

permissions:
  id-token: write
  actions: read
  contents: read

# Concurrency: only one E2E job runs at a time
concurrency:
  group: e2e-tests
  cancel-in-progress: true

jobs:
  # Build the matrix dynamically so workflow_dispatch can select a single agent.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set.outputs.agents }}
    steps:
      - id: set
        run: |
          input="${{ github.event.inputs.agent }}"
          if [ -n "$input" ]; then
            echo "agents=[\"$input\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'agents=["claude-code","opencode","gemini-cli","factoryai-droid","cursor-cli", "kiro"]' >> "$GITHUB_OUTPUT"
          fi

  e2e-tests:
    needs: matrix-setup
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.matrix-setup.outputs.agents) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v3

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install agent CLI
        run: |
          case "${{ matrix.agent }}" in
            claude-code) curl -fsSL https://claude.ai/install.sh | bash ;;
            opencode)    curl -fsSL https://opencode.ai/install | bash ;;
            gemini-cli)  npm install -g @google/gemini-cli ;;
            kiro)
              KIRO_VERSION="1.27.0"
              curl -fsSL "https://desktop-release.q.us-east-1.amazonaws.com/${KIRO_VERSION}/kirocli-x86_64-linux.zip" -o kiro.zip
              unzip -q kiro.zip
              mkdir -p ~/.local/bin
              cp kirocli/bin/kiro-cli-chat ~/.local/bin/
              chmod +x ~/.local/bin/kiro-cli-chat
              rm -rf kirocli kiro.zip
              ;;
            cursor-cli)  curl https://cursor.com/install -fsS | bash ;;
            factoryai-droid) curl -fsSL https://app.factory.ai/cli | sh ;;
          esac
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Inject Kiro auth token
        if: matrix.agent == 'kiro'
        run: |
          mkdir -p ~/.local/share/kiro-cli
          DB="$HOME/.local/share/kiro-cli/data.sqlite3"
          sqlite3 "$DB" <<'SQL'
          CREATE TABLE IF NOT EXISTS migrations (id INTEGER PRIMARY KEY, version INTEGER NOT NULL, migration_time INTEGER NOT NULL);
          INSERT OR IGNORE INTO migrations (id, version, migration_time) VALUES (1,0,0),(2,1,0),(3,2,0),(4,3,0),(5,4,0),(6,5,0),(7,6,0),(8,7,0),(9,8,0);
          CREATE TABLE IF NOT EXISTS auth_kv (key TEXT PRIMARY KEY, value TEXT);
          CREATE TABLE IF NOT EXISTS state (key TEXT PRIMARY KEY, value BLOB);
          CREATE TABLE IF NOT EXISTS conversations (key TEXT PRIMARY KEY, value TEXT);
          CREATE TABLE IF NOT EXISTS conversations_v2 (key TEXT PRIMARY KEY, value TEXT, updated_at TEXT);
          CREATE TABLE IF NOT EXISTS history (id INTEGER PRIMARY KEY, value TEXT, updated_at TEXT);
          SQL
          python3 -c "
          import sqlite3, os
          db = sqlite3.connect(os.environ['HOME'] + '/.local/share/kiro-cli/data.sqlite3')
          db.execute('INSERT OR REPLACE INTO auth_kv (key, value) VALUES (?, ?)',
                     ('kirocli:odic:device-registration', os.environ['KIRO_DEVICE_REG']))
          db.execute('INSERT OR REPLACE INTO auth_kv (key, value) VALUES (?, ?)',
                     ('kirocli:odic:token', os.environ['KIRO_AUTH_TOKEN']))
          db.commit()
          "
          kiro-cli-chat whoami -f json
        env:
          KIRO_AUTH_TOKEN: ${{ secrets.KIRO_AUTH_TOKEN }}
          KIRO_DEVICE_REG: ${{ secrets.KIRO_DEVICE_REG }}

      - name: Bootstrap agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
        run: go run ./e2e/bootstrap

      - name: Run E2E Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          E2E_CONCURRENT_TEST_LIMIT: ${{ matrix.agent == 'gemini-cli' && '6' || matrix.agent == 'factoryai-droid' && '1' || '' }}
        run: mise run test:e2e --agent ${{ matrix.agent }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.agent }}
          path: e2e/artifacts/
          retention-days: 7

  notify-slack:
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: ${{ always() && needs.e2e-tests.result == 'failure' && github.event_name == 'push' }}
    steps:
      - name: Get failed agents
        id: failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name | capture("\\((?<agent>[^)]+)\\)") | .agent] | join(", ")')
          echo "agents=$failed" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of E2E failure
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.E2E_SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":red_circle: *E2E Tests Failed* on `main`\n\nFailed agents: *${{ steps.failed.outputs.agents }}*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run details>"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Commit: <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}> by ${{ github.actor }}"
                    }
                  ]
                }
              ]
            }
